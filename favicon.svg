<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 圆角背景 -->
  <rect width="100" height="100" rx="22" fill="#dbeafe"/>

  <!-- 左镜片框（白底蓝边） -->
  <circle cx="25" cy="53" r="17" fill="white" stroke="#2563eb" stroke-width="7"/>

  <!-- 右镜片框（白底蓝边） -->
  <circle cx="75" cy="53" r="17" fill="white" stroke="#2563eb" stroke-width="7"/>

  <!-- 鼻梁：连接两个镜框的弧线 -->
  <path d="M 42 53 Q 50 44 58 53" fill="none" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>

  <!-- 左镜腿：向左外侧延伸 -->
  <line x1="8" y1="53" x2="1" y2="63" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>

  <!-- 右镜腿：向右外侧延伸 -->
  <line x1="92" y1="53" x2="99" y2="63" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
</svg>
